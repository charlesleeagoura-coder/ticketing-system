<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Desk — Ticket Detail</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-brand">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    Support Desk
  </a>
  <div class="nav-links">
    <a href="/" class="nav-link">Dashboard</a>
    <a href="/reports" class="nav-link">Reports</a>
    <a href="/new-ticket" class="btn-nav">+ New Ticket</a>
  </div>
</nav>

<div class="page" id="pageContainer">
  <div class="loading-page">
    <span class="spinner" style="border-color:#dce1e7;border-top-color:#1e3a5f;"></span>
    Loading ticket…
  </div>
</div>

<!-- Email Modal -->
<div class="modal-overlay" id="emailModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Send Email Response</span>
      <button class="modal-close" id="closeEmailModal">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label" for="emailTo">To <span class="req">*</span></label>
        <input type="email" id="emailTo" class="form-control" placeholder="recipient@example.com">
      </div>
      <div class="form-group">
        <label class="form-label" for="emailSubject">Subject <span class="req">*</span></label>
        <input type="text" id="emailSubject" class="form-control" placeholder="Subject line">
      </div>
      <div class="form-group">
        <label class="form-label" for="emailBody">Message <span class="req">*</span></label>
        <textarea id="emailBody" class="form-control" rows="7" placeholder="Type your response here…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancelEmailModal">Cancel</button>
      <button class="btn btn-primary" id="sendEmailBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Send Email
      </button>
    </div>
  </div>
</div>

<!-- Edit Ticket Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Edit Ticket</span>
      <button class="modal-close" id="closeEditModal">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label" for="editTitle">Subject / Title</label>
        <input type="text" id="editTitle" class="form-control">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="editCategory">Category</label>
          <select id="editCategory" class="form-control">
            <option value="">— None —</option>
            <option value="Hardware">Hardware</option>
            <option value="Software">Software</option>
            <option value="Network">Network</option>
            <option value="Account">Account / Access</option>
            <option value="Email">Email</option>
            <option value="Printer">Printer</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="editPriority">Priority</label>
          <select id="editPriority" class="form-control">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
            <option value="critical">Critical</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="editAssignedTo">Assigned To</label>
        <input type="text" id="editAssignedTo" class="form-control" placeholder="Technician name">
      </div>
      <div class="form-group">
        <label class="form-label" for="editDescription">Description</label>
        <textarea id="editDescription" class="form-control" rows="4"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label" for="editSymptoms">Symptoms</label>
        <textarea id="editSymptoms" class="form-control" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label" for="editSolution">Solution / Resolution</label>
        <textarea id="editSolution" class="form-control" rows="4" placeholder="Document the resolution steps…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancelEditModal">Cancel</button>
      <button class="btn btn-primary" id="saveEditBtn">Save Changes</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="/js/ticket-detail.js"></script>
</body>
</html>
