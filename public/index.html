<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Desk — Dashboard</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-brand">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    Digital Lee Consulting - Support Desk
  </a>
  <div class="nav-links">
    <a href="/" class="nav-link active">Dashboard</a>
    <a href="/reports" class="nav-link">Reports</a>
    <a href="/new-ticket" class="btn-nav">+ New Ticket</a>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Dashboard</h1>
      <p class="page-subtitle">All support tickets</p>
    </div>
    <a href="/new-ticket" class="btn btn-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Ticket
    </a>
  </div>

  <!-- Stats -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card total"><span class="stat-label">Total</span><span class="stat-value" id="statTotal">—</span></div>
    <div class="stat-card new"><span class="stat-label">New</span><span class="stat-value" id="statNew">—</span></div>
    <div class="stat-card progress"><span class="stat-label">In Progress</span><span class="stat-value" id="statProgress">—</span></div>
    <div class="stat-card resolved"><span class="stat-label">Resolved</span><span class="stat-value" id="statResolved">—</span></div>
    <div class="stat-card closed"><span class="stat-label">Closed</span><span class="stat-value" id="statClosed">—</span></div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Search by ticket #, title, or requester…">
    </div>
    <select class="filter-select" id="filterStatus">
      <option value="all">All Statuses</option>
      <option value="new">New</option>
      <option value="in_progress">In Progress</option>
      <option value="resolved">Resolved</option>
      <option value="closed">Closed</option>
    </select>
    <select class="filter-select" id="filterPriority">
      <option value="all">All Priorities</option>
      <option value="critical">Critical</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
    <button class="btn btn-secondary btn-sm" id="btnClear">Clear</button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table class="table">
      <thead>
        <tr>
          <th>Ticket #</th>
          <th>Subject</th>
          <th>Requester</th>
          <th>Category</th>
          <th>Priority</th>
          <th>Status</th>
          <th>Date</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="ticketTbody">
        <tr><td colspan="8"><div class="loading-page"><span class="spinner" style="border-color:#dce1e7;border-top-color:#1e3a5f;"></span> Loading…</div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="/js/dashboard.js"></script>
</body>
</html>
