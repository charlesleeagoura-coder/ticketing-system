version: "3.9"

services:
  ticketing:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/tickets.db
      - PORT=3000
      # Email (SMTP) — uncomment and fill in to enable outbound email
      # - EMAIL_HOST=smtp.gmail.com
      # - EMAIL_PORT=587
      # - EMAIL_SECURE=false
      # - EMAIL_USER=your-email@gmail.com
      # - EMAIL_PASS=your-app-password
      # - EMAIL_FROM="Support Desk <your-email@gmail.com>"
    restart: unless-stopped
